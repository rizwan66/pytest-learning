[pytest]
asyncio_mode = auto

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    smoke: marks tests as smoke tests
    retry: retry the test up to n times on failure

# Show 10 slowest tests after each run
# Remove or lower this if it's too noisy:
# addopts = --durations=5

addopts = -v

# Warnings: turn freezegun's datetime subclass warning into a quiet note
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
